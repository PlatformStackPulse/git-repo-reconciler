name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
            git rev-parse --verify --quiet "${tag}^{commit}" >/dev/null || {
              echo "Tag does not exist: ${tag}" >&2
              exit 1
            }
            git checkout --detach "$tag"
            echo "version=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          chmod +x scripts/build.sh
          scripts/build.sh "${{ steps.version.outputs.version }}"

      - name: Package release artifacts
        run: |
          mkdir -p dist
          cp bin/grr "dist/grr-${{ steps.version.outputs.version }}"
          cd dist && sha256sum ./* > SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo_name
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.repo }}:${{ needs.build.outputs.version }}
            ghcr.io/${{ steps.repo_name.outputs.repo }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo_name.outputs.repo }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.repo_name.outputs.repo }}:buildcache,mode=max
