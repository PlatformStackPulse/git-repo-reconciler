name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: make lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install shfmt
        run: |
          SHFMT_VERSION="v3.12.0"
          curl -sS "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" -L -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -sS "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -L | tar -xz -C /usr/local/bin actionlint

      - name: Check formatting
        run: make fmt-check

      - name: Lint GitHub Actions workflows
        run: make workflow-lint

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install BATS
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y bats
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bats-core
          fi

      - name: Run tests
        run: make test

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run security checks
        run: make security

      - name: Syntax check all scripts
        run: make vet

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Conventional Commit PR Check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(\(.+\))?!?:\s.{1,}$'
          if ! [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "PR title does not follow Conventional Commits format"
            echo "Expected format: feat: description, fix: description, etc."
            echo "Your title: $PR_TITLE"
            exit 1
          fi
          echo "PR title follows Conventional Commits format"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [shellcheck, format, test, security]
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: make build VERSION=dev COMMIT="${{ github.sha }}"

      - name: Verify build artifact
        run: |
          test -f bin/grr
          bin/grr --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: grr-binary
          path: bin/grr
          retention-days: 7
