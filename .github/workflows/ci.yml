name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  checks: write

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: find src/ lib/ scripts/ -name '*.sh' -exec shellcheck -S warning -x {} +

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          SHFMT_VERSION="v3.8.0"
          curl -sS "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" -L -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Check formatting
        run: |
          UNFORMATTED=$(find src/ lib/ scripts/ -name '*.sh' -exec shfmt -d -i 4 -ci {} + 2>&1 || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "Shell scripts are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y bats
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bats-core
          fi

      - name: Run tests
        run: bats test/unit/ test/integration/

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck (warning level)
        run: find src/ lib/ scripts/ -name '*.sh' -exec shellcheck -S warning -x -f gcc {} +

      - name: Syntax check all scripts
        run: find src/ lib/ -name '*.sh' -exec bash -n {} +

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Conventional Commit PR Check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(\(.+\))?!?:\s.{1,}$'
          if ! [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "PR title does not follow Conventional Commits format"
            echo "Expected format: feat: description, fix: description, etc."
            echo "Your title: $PR_TITLE"
            exit 1
          fi
          echo "PR title follows Conventional Commits format"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [shellcheck, format, test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x scripts/build.sh
          scripts/build.sh "${{ github.sha }}"

      - name: Verify build artifact
        run: |
          test -f bin/bash-template
          bin/bash-template --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bash-template-binary
          path: bin/bash-template
          retention-days: 7
